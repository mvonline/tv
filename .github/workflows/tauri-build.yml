name: 'Tauri Cross-Platform Build'

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  desktop-builds:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      
      - name: install frontend deps
        run: npm install
        
      - name: Generate Changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: 'MasTV ${{ github.ref_name }}'
          releaseBody: 'Download the latest version of MasTV for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  mobile-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: setup android
        uses: android-actions/setup-android@v3
      - name: install frontend deps
        run: npm install
      - name: init android
        run: npx tauri android init --ci
      - name: build android
        run: npx tauri android build --apk
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/**/*.aab,src-tauri/gen/android/**/*.apk
          tag_name: ${{ github.ref_name }}

  mobile-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim
      - name: install frontend deps
        run: npm install
      - name: init ios
        run: npx tauri ios init --ci
      - name: build ios
        run: npx tauri ios build --export-method debugging --target aarch64-sim
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/apple/**/*.ipa,src-tauri/gen/apple/**/*.app
          tag_name: ${{ github.ref_name }}

  production-release:
    needs: [desktop-builds, mobile-android, mobile-ios]
    runs-on: ubuntu-latest
    environment: Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Notify Store Submission
        run: echo "Starting official submission to App Store and Google Play Store..."

      # Placeholder for Play Store Upload
      # Requires ANDROID_SERVICE_ACCOUNT_JSON secret
      - name: Upload to Google Play
        if: env.ANDROID_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
          packageName: com.mastv.iran
          releaseFiles: src-tauri/gen/android/*.aab
          track: internal

      # Placeholder for App Store Upload
      # Requires APPLE_ID and APPLE_APP_SPECIFIC_PASSWORD
      - name: Upload to App Store
        if: env.APPLE_ID != ''
        run: |
          xcrun altool --upload-app --type ios --file src-tauri/gen/apple/*.ipa --username "${{ secrets.APPLE_ID }}" --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
